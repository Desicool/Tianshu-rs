services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: workflow_engine
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  approval_workflow:
    build: .
    command: ["--postgres", "postgres://postgres:postgres@postgres/workflow_engine"]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      RUST_LOG: info

volumes:
  postgres_data:
